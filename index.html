<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasif</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playball&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            /* Background mein guitar wali photo aur sleek dark overlay */
            background: linear-gradient(rgba(0, 0, 0, 0.2) 0%, rgba(0, 0, 0, 0.6) 60%, #000000 95%), 
                        url('guitar.jpg') no-repeat center top;
            background-size: cover;
            background-color: #000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .mobile-screen {
            max-width: 450px;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 70px 30px;
            text-align: center;
        }
        .brand-top {
            font-family: 'Playball', cursive;
            font-size: 46px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }
        .icons-center-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 45px;
            margin-bottom: 20px;
        }
        .icon-link {
            text-decoration: none;
            color: #c084fc; /* Purple Glow theme */
            font-size: 46px;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .icon-link:hover {
            transform: translateY(-8px) scale(1.15);
            color: #ffffff;
            text-shadow: 0 0 20px #a855f7;
        }
        .brand-bottom-box { margin-bottom: 20px; }
        .brand-bottom {
            font-family: 'Playball', cursive;
            font-size: 38px;
            color: #ffffff;
            display: inline-block;
            position: relative;
        }
        .brand-bottom::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 15%;
            width: 70%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #c084fc, transparent);
            box-shadow: 0 0 10px #c084fc;
        }
    </style>
</head>
<body>
    <div class="mobile-screen">
        <div class="brand-top">Kasif</div>
        
        <div class="icons-center-box">
            <a href="https://instagram.com/k4sifx__" target="_blank" class="icon-link"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://t.me/K4sifx" target="_blank" class="icon-link"><i class="fa-brands fa-telegram"></i></a>
            <a href="https://wa.me/584262211965" target="_blank" class="icon-link"><i class="fa-brands fa-whatsapp"></i></a>
        </div>
        
        <div class="brand-bottom-box"><div class="brand-bottom">Kasif</div></div>
    </div>
</body>
</html>
