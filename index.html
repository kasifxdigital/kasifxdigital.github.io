<!DOCTYPE html>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Share Tech Mono', monospace; overflow: hidden; }

            height: 100vh; width: 100vw;
            background-image: url('bg.jpg');
            background-size: cover; background-position: center;

        .bio { font-size: 16px; margin-bottom: 30px; border-top: 1px solid #333; padding-top: 20px; }
        .links a {
            display: block; color: #00ff41; text-decoration: none; border: 1px solid #00ff41;
            padding: 10px; margin: 10px 0; border-radius: 5px; transition: 0.3s;
        }
        .links a:hover { background: #00ff41; color: #000; }
