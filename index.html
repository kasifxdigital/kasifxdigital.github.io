<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KASIF | Cyber Matrix Utility</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playball&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            background-color: #030303;
            color: #00ff41;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
            font-family: 'Share Tech Mono', monospace;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.15;
        }
        .wrapper {
            position: relative;
            z-index: 10;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            padding: 35px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        header {
            text-align: center;
        }
        .brand-title {
            font-family: 'Playball', cursive;
            font-size: 55px;
            color: #ffffff;
            text-shadow: 0 0 10px #00ff41, 0 0 20px #00ff41;
        }
        .sub-title {
            font-size: 13px;
            letter-spacing: 3px;
            color: #00ff41;
            text-transform: uppercase;
            margin-top: 5px;
        }
        .social-box {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 12px;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #00ff41;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.15);
        }
        .social-box a {
            color: #00ff41;
            font-size: 30px;
            transition: all 0.3s;
        }
        .social-box a:hover {
            color: #ffffff;
            transform: scale(1.15);
            text-shadow: 0 0 15px #00ff41;
        }
        .tool-card {
            background: rgba(8, 8, 8, 0.95);
            border: 1px solid #113311;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.9);
        }
        .tool-card h3 {
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px dashed #113311;
            padding-bottom: 6px;
        }
        .tool-card h3 i { color: #00ff41; }
        
        textarea, input, button {
            width: 100%;
            padding: 11px;
            background: #000;
            border: 1px solid #113311;
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            border-radius: 5px;
            margin-bottom: 10px;
            outline: none;
            resize: none;
        }
        textarea:focus, input:focus { border-color: #00ff41; }
        
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            background: #001f00;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover { background: #00ff41; color: #000; box-shadow: 0 0 10px #00ff41; }
        
        .result-box {
            padding: 10px;
            background: #020202;
            border-left: 3px solid #00ff41;
            font-size: 12px;
            white-space: pre-line;
            margin-top: 5px;
            display: none;
            color: #a0ffa0;
            word-break: break-all;
        }
        footer {
            text-align: center;
            font-size: 11px;
            color: #444;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="wrapper">
        <header>
            <div class="brand-title">Kasif</div>
            <div class="sub-title">// SECURITY & UTILITY CONTROL //</div>
        </header>

        <div class="social-box">
            <a href="https://instagram.com/k4sifx__" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://t.me/K4sifx" target="_blank"><i class="fa-brands fa-telegram"></i></a>
            <a href="https://wa.me/584262211965" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
        </div>

        <div class="tool-card">
            <h3><i class="fa-solid fa-user-secret"></i> Secret Cipher Encrypter</h3>
            <textarea id="cipherText" rows="3" placeholder="Yahan apna secret message likho ya secret code paste karo..."></textarea>
            <div class="btn-group">
                <button onclick="processCipher('encrypt')">LOCK (ENCRYPT)</button>
                <button onclick="processCipher('decrypt')">UNLOCK (DECRYPT)</button>
            </div>
            <div id="cipherResult" class="result-box"></div>
        </div>

        <div class="tool-card">
            <h3><i class="fa-solid fa-network-wired"></i> Network Node Lookup</h3>
            <input type="text" id="ipInput" placeholder="Koi bhi IP Address ya Hostname daalo (e.g. 8.8.8.8)">
            <button onclick="trackIP()">SCAN NODE DETAILS</button>
            <div id="ipResult" class="result-box"></div>
        </div>

        <footer>&copy; 2026 KASIF FRAMEWORK. STABLE CORE ACTIVE.</footer>
    </div>

    <script>
        // Matrix Rain Setup
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()_+'.split('');
        const fontSize = 16; const columns = canvas.width / fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);
        const draw = () => {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff41'; ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i*fontSize, rainDrops[i]*fontSize);
                if(rainDrops[i]*fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        };
        setInterval(draw, 30);

        // Cipher Logic
        function processCipher(action) {
            const input = document.getElementById('cipherText').value.trim();
            const resBox = document.getElementById('cipherResult');
            if(!input) {
                resBox.style.display = 'block';
                resBox.innerText = '⚠️ Error: Input field khali hai!';
                return;
            }
            resBox.style.display = 'block';
            if(action === 'encrypt') {
                try {
                    const encoded = btoa(encodeURIComponent(input));
                    resBox.innerText = `[+] ENCRYPTED SECRET CODE:\n\n${encoded}`;
                } catch(e) {
                    resBox.innerText = '❌ Encryption failed.';
                }
            } else {
                try {
                    const decoded = decodeURIComponent(atob(input));
                    resBox.innerText = `[+] DECRYPTED ORIGINAL TEXT:\n\n${decoded}`;
                } catch(e) {
                    resBox.innerText = '❌ Invalid Code! Yeh code sahi tarike se decrypted nahi ho sakta.';
                }
            }
        }

        // Host IP Data Logic
        async function trackIP() {
            const ip = document.getElementById('ipInput').value.trim();
            const resBox = document.getElementById('ipResult');
            resBox.style.display = 'block';
            resBox.innerText = 'Scanning target infrastructure nodes...';
            try {
                const response = await fetch(`https://ipapi.co/${ip}/json/`);
                const data = await response.json();
                if(data.error) {
                    resBox.innerText = '❌ Error: Host target invalid ya details offline hain.';
                } else {
                    resBox.innerText = `[+] TARGET      : ${data.ip}\n[+] LOCATION    : ${data.city}, ${data.region} (${data.country_name})\n[+] NETWORK ORG : ${data.org}\n[+] TIMEZONE    : ${data.timezone}`;
                }
            } catch (e) {
                resBox.innerText = '❌ Connection Interrupted.';
            }
        }

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    </script>
</body>
</html>
