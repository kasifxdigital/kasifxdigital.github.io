<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KASIF | Ultimate Cyber Terminal v3.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playball&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            background-color: #020202;
            color: #00ff41;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
            font-family: 'Share Tech Mono', monospace;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.15;
        }
        .wrapper {
            position: relative;
            z-index: 10;
            max-width: 650px;
            width: 100%;
            margin: 0 auto;
            padding: 35px 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        header {
            text-align: center;
        }
        .brand-title {
            font-family: 'Playball', cursive;
            font-size: 55px;
            color: #ffffff;
            text-shadow: 0 0 10px #00ff41, 0 0 20px #00ff41;
        }
        .sub-title {
            font-size: 13px;
            letter-spacing: 4px;
            color: #00ff41;
            text-transform: uppercase;
            margin-top: 5px;
        }
        .social-box {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 12px;
            background: rgba(5, 5, 5, 0.95);
            border: 1px solid #00ff41;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }
        .social-box a {
            color: #00ff41;
            font-size: 30px;
            transition: all 0.3s;
        }
        .social-box a:hover {
            color: #ffffff;
            transform: scale(1.15);
            text-shadow: 0 0 15px #00ff41;
        }
        .tool-card {
            background: rgba(5, 5, 5, 0.95);
            border: 1px solid #113311;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.9);
            transition: all 0.3s;
        }
        .tool-card:hover {
            border-color: #00ff41;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.1);
        }
        .tool-card h3 {
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px dashed #113311;
            padding-bottom: 6px;
        }
        .tool-card h3 i { color: #00ff41; }
        
        textarea, input, button {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #113311;
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            border-radius: 5px;
            margin-bottom: 10px;
            outline: none;
        }
        textarea:focus, input:focus { border-color: #00ff41; }
        
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            background: #001a00;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover { background: #00ff41; color: #000; box-shadow: 0 0 10px #00ff41; }
        
        .result-box {
            padding: 12px;
            background: #010101;
            border-left: 3px solid #00ff41;
            font-size: 13px;
            white-space: pre-line;
            margin-top: 5px;
            display: none;
            color: #a0ffa0;
            word-break: break-all;
        }
        .download-btn {
            background: #00ff41 !important;
            color: #000 !important;
            display: block;
            text-align: center;
            text-decoration: none;
            padding: 11px;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 10px;
        }
        footer {
            text-align: center;
            font-size: 11px;
            color: #444;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="wrapper">
        <header>
            <div class="brand-title">Kasif</div>
            <div class="sub-title">// MULTI-FRAMEWORK CONTROL OS v3.0 //</div>
        </header>

        <div class="social-box">
            <a href="https://instagram.com/k4sifx__" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://t.me/K4sifx" target="_blank"><i class="fa-brands fa-telegram"></i></a>
            <a href="https://wa.me/584262211965" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
        </div>

        <div class="tool-card">
            <h3><i class="fa-solid fa-cloud-arrow-down"></i> Multi-Platform Video Downloader</h3>
            <input type="text" id="videoUrl" placeholder="Paste Video URL (Insta Reels, YouTube, FB...)">
            <button onclick="downloadVideo()">EXTRACT TARGET STREAM</button>
            <div id="dlResult" class="result-box"></div>
        </div>

        <div class="tool-card">
            <h3><i class="fa-brands fa-instagram"></i> Instagram Target Stalker / Audit</h3>
            <input type="text" id="instaUser" placeholder="Enter Instagram Username (e.g. k4sifx__)">
            <button onclick="stalkInsta()">GENERATE PROFILE TRACE</button>
            <div id="instaResult" class="result-box"></div>
        </div>

        <div class="tool-card">
            <h3><i class="fa-solid fa-key"></i> Firewall-Resistant Key Generator</h3>
            <button onclick="genPassword()">GENERATE 16-BIT ENCRYPTED PASSWORD</button>
            <div id="passResult" class="result-box"></div>
        </div>

        <div class="tool-card">
            <h3><i class="fa-solid fa-user-secret"></i> Advanced Cryptography Cipher</h3>
            <textarea id="cipherText" rows="2" placeholder="Secret text likho ya binary data paste karo..."></textarea>
            <div class="btn-group">
                <button onclick="processCipher('encrypt')">LOCK CIPHER</button>
                <button onclick="processCipher('decrypt')">DECRYPT KEY</button>
            </div>
            <div id="cipherResult" class="result-box"></div>
        </div>

        <div class="tool-card">
            <h3><i class="fa-solid fa-network-wired"></i> Website IP Router Tracer</h3>
            <input type="text" id="ipInput" placeholder="Enter Domain or IP Address (e.g. google.com)">
            <button onclick="trackIP()">INITIALIZE PING SEQUENCE</button>
            <div id="ipResult" class="result-box"></div>
        </div>

        <footer>&copy; 2026 KASIF EXPLOITS MAINFRAME. CODES SYNCED.</footer>
    </div>

    <script>
        // Matrix Rain Loop Animation
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()_+'.split('');
        const fontSize = 16; const columns = canvas.width / fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);
        const draw = () => {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff41'; ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i*fontSize, rainDrops[i]*fontSize);
                if(rainDrops[i]*fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        };
        setInterval(draw, 30);

        // Video Downloader Implementation
        async function downloadVideo() {
            const urlInput = document.getElementById('videoUrl').value.trim();
            const resBox = document.getElementById('dlResult');
            if(!urlInput) { resBox.style.display = 'block'; resBox.innerText = '⚠️ Error: URL provide karna compulsory hai.'; return; }
            resBox.style.display = 'block';
            resBox.innerText = 'Hooking target api data... Intercepting video streams...';
            setTimeout(() => {
                resBox.innerHTML = `[+] PACKETS CAPTURED SUCCESSFULLY!\n[+] Gateway Secured for Extraction.\n\n<a href="https://pubgvideodownloader.com/process?url=${encodeURIComponent(urlInput)}" target="_blank" class="download-btn"><i class="fa-solid fa-download"></i> OPEN HD DOWNLOAD SCREEN</a>`;
            }, 1200);
        }

        // Instagram OSINT Trace
        function stalkInsta() {
            const user = document.getElementById('instaUser').value.trim();
            const resBox = document.getElementById('instaResult');
            if(!user) { resBox.style.display = 'block'; resBox.innerText = '⚠️ Username mandatory hai!'; return; }
            resBox.style.display = 'block';
            resBox.innerText = `[+] SCANNING NODE: instagram.com/${user}\n[+] Target Detected on Meta Grid.\n\nDeep Extraction Links:\n👉 Profile Link: https://instagram.com/${user}\n👉 Alternate Backup View: https://imginn.com/user/${user}/`;
        }

        // Pass Gen Logic
        function genPassword() {
            const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
            let pass = "";
            for (let i = 0; i < 16; i++) pass += chars.charAt(Math.floor(Math.random() * chars.length));
            const resBox = document.getElementById('passResult');
            resBox.style.display = 'block';
            resBox.innerText = `[ LOCAL DEPLOYMENT KEY GENERATED ]\n🔑 Key: ${pass}`;
        }

        // Cryptography Cipher Logic
        function processCipher(action) {
            const input = document.getElementById('cipherText').value.trim();
            const resBox = document.getElementById('cipherResult');
            if(!input) { resBox.style.display = 'block'; resBox.innerText = '⚠️ Text Box is Empty!'; return; }
            resBox.style.display = 'block';
            if(action === 'encrypt') {
                resBox.innerText = `[+] ENCRYPTED TERMINAL BITCODE:\n\n${btoa(encodeURIComponent(input))}`;
            } else {
                try { resBox.innerText = `[+] DECRYPTED ORIGINAL DATA:\n\n${decodeURIComponent(atob(input))}`; } 
                catch(e) { resBox.innerText = '❌ Access Denied: Invalid Hex Bitcode Key.'; }
            }
        }

        // Web Node Tracker API
        async function trackIP() {
            const ip = document.getElementById('ipInput').value.trim();
            const resBox = document.getElementById('ipResult');
            resBox.style.display = 'block'; resBox.innerText = 'Resolving domain DNS packet layers...';
            try {
                const response = await fetch(`https://ipapi.co/${ip}/json/`);
                const data = await response.json();
                if(data.error) { resBox.innerText = `❌ Node tracking error for target: ${ip}`; } 
                else { resBox.innerText = `[+] TARGET HOST : ${data.ip}\n[+] NODE RECOGN : ${data.city}, ${data.country_name}\n[+] SYSTEM ISP  : ${data.org}\n[+] TIME CLOCK  : ${data.timezone}`; }
            } catch (e) { resBox.innerText = '❌ Route Interrupted.'; }
        }

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    </script>
</body>
</html>
