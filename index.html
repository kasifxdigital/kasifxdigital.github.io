<!<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KASIF | ELITE CYBER OPS</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        .card { 
            background: rgba(0, 20, 20, 0.85); border: 2px solid #0f0; padding: 30px; border-radius: 20px;
            backdrop-filter: blur(10px); text-align: center; color: #0f0; width: 320px; box-shadow: 0 0 20px #0f0;
            pointer-events: auto;
        }
        .dp { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #0f0; margin-bottom: 15px; background: url('https://img.freepik.com/free-vector/cyberpunk-hacker-character_23-2148530364.jpg'); background-size: cover; }
        .btn { display: block; background: #0f0; color: #000; padding: 12px; margin-top: 20px; text-decoration: none; font-weight: bold; border-radius: 5px; }
        a { color: #fff; text-decoration: none; display: block; margin: 5px 0; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="overlay">
        <div class="card">
            <div class="dp"></div>
            <h2>KASIF</h2>
            <p>ELITE CYBER-OPERATOR</p>
            <div style="text-align: left; font-size: 0.9rem;">
                <p>✉️ k4sifx@gmail.com</p>
                <p>📸 @k4sifx__</p>
                <p>👻 k4sif.7</p>
                <p>✈️ @K4sifx</p>
            </div>
            <a href="https://wa.me/584262211965" class="btn">SECURE ACCESS</a>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const katakana = '0101010101';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0'; ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = katakana.charAt(Math.floor(Math.random() * katakana.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);
    </script>
</body>
</html>
